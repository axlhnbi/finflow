<ion-content class="ion-padding login-content">
  <div class="login-container">
    
    <div class="header-section">
      <div class="logo-box">
        <ion-icon name="wallet"></ion-icon>
      </div>
      <h1>Selamat Datang! 👋</h1>
      <p>Catat pengeluaran jadi lebih cepat dan aman.</p>
    </div>

    <div class="form-section">
      <ion-item class="custom-input" lines="none">
        <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
        <ion-input type="email" placeholder="Email Address"></ion-input>
      </ion-item>

      <ion-item class="custom-input" lines="none">
        <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
        <ion-input type="password" placeholder="Password"></ion-input>
      </ion-item>

      <div class="forgot-password">
        <a href="#">Lupa Password?</a>
      </div>

      <ion-button expand="block" class="login-btn" shape="round" (click)="doLogin()">
        Masuk
      </ion-button>
    </div>

   <div class="footer-section">
    <p>Belum punya akun? <a routerLink="/register">Daftar sekarang</a></p>
   </div>

  </div>
</ion-content>
